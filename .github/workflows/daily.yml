name: Daily AI Med Digest

on:
  schedule:
    # 每天北京时间 08:07（UTC 00:07），避开整点高峰
    - cron: '7 0 * * *'
  workflow_dispatch:  # 支持手动触发，方便调试

permissions:
  contents: write  # 需要 commit seen.db 回仓库

concurrency:
  group: ai-med-daily
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write YouTube cookies
        if: ${{ secrets.YOUTUBE_COOKIES != '' }}
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          echo "$YOUTUBE_COOKIES" > /tmp/youtube_cookies.txt
          echo "YOUTUBE_COOKIES_FILE=/tmp/youtube_cookies.txt" >> "$GITHUB_ENV"

      - name: Run digest
        env:
          # LLM 配置 —— 默认用 Claude。想换其他厂商见 README
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'anthropic' }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 飞书
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SIGN_SECRET: ${{ secrets.FEISHU_SIGN_SECRET }}
          # YouTube cookies
          YOUTUBE_COOKIES_FILE: ${{ env.YOUTUBE_COOKIES_FILE }}
        run: python -m src.main

      - name: Commit updated seen.db
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen.db
          if git diff --cached --quiet; then
            echo "no changes to seen.db"
          else
            git commit -m "chore: update seen.db [skip ci]"
            git push
          fi
